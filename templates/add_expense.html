{% extends 'base.html' %}

{% block content %}
<div class="form-wrapper">
  <div class="card form-card">
    <h1>Add Expense</h1>
    <p>Create a new expense record.</p>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" class="expense-form">
      <label>Title</label>
      <input type="text" name="title" placeholder="Groceries" required />

      <label>Amount</label>
      <input type="number" step="0.01" name="amount" placeholder="50.00" required />

      <label>Category</label>
      <select name="category" required>
        <option value="">Select category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Health">Health</option>
        <option value="Other">Other</option>
      </select>

      <button type="submit" class="btn full-width">Save Expense</button>
    </form>
  </div>
</div>
{% endblock %}
